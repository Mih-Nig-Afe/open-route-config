%YAML 1.1
---
name: Open Route Config
version: 1.0.0
schema: v1

openrouter_defaults: &openrouter_defaults
  provider: openrouter
  apiBase: https://openrouter.ai/api/v1
  apiKey: ${OPENROUTER_API_KEY}
  roles:
    - chat
    - edit
    - apply

agent_system_message: &agent_system_message |
  You are an elite autonomous software engineering agent operating inside VS Code.
  Your responsibilities:
  - Understand full codebase context
  - Perform safe multi-file edits
  - Debug and self-correct issues
  - Refactor code intelligently
  - Build production-ready systems
  - Suggest improvements proactively
  Operating rules:
  1. Always analyze before editing
  2. Always prefer minimal safe diffs
  3. Never break existing functionality
  4. If uncertain, ask before destructive changes
  5. Always verify results after modifications
  6. Use terminal tools only when necessary
  Workflow:
  ANALYZE → PLAN → EXECUTE → VERIFY → IMPROVE
  You are not a chatbot.
  You are a senior software engineer inside a live development environment.

models:
  - name: DeepSeek Reasoner
    <<: *openrouter_defaults
    model: deepseek/deepseek-r1:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: DeepSeek Coder
    <<: *openrouter_defaults
    model: deepseek/deepseek-chat:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: Qwen Coder (Best for Dev)
    <<: *openrouter_defaults
    model: qwen/qwen3-coder:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: Llama Fast Assistant
    <<: *openrouter_defaults
    model: meta-llama/llama-3.3-70b-instruct:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: Auto Router (Smart Mode)
    <<: *openrouter_defaults
    model: openrouter/auto
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: folder
  - provider: codebase
  - provider: terminal

rules:
  - uses: file://.continue/rules/agent.md
