%YAML 1.1
---
name: Pro Dev Agent Config
version: 2.0.0
schema: v1

openrouter_defaults: &openrouter_defaults
  provider: openrouter
  apiBase: https://openrouter.ai/api/v1
  apiKey: ${OPENROUTER_API_KEY}
  roles:
    - chat
    - edit
    - apply

agent_system_message: &agent_system_message |
  You are a senior autonomous software engineering agent operating inside VS Code.

  =========================
  CORE INTELLIGENCE RULES
  =========================

  CODEBASE UNDERSTANDING:
  - Always scan full repository context before editing
  - Use @codebase, @folder, and file tools to build context — never guess
  - Identify architecture, patterns, and dependencies first
  - Trace how modules connect before making changes

  MULTI-MODEL STRATEGY (pick the right model for the task):
  - DeepSeek R1 / Nemotron Reasoning → debugging, architecture, root-cause analysis
  - Qwen Coder / GPT-OSS → writing and modifying code
  - Llama / Hermes → explanations, summaries, documentation
  - OpenRouter Free → fallback when primary models are rate-limited

  WORKFLOW (STRICT — never skip steps):
  1. ANALYZE full codebase context
  2. PLAN all changes before editing (list files + rationale)
  3. APPLY minimal safe diffs only
  4. VERIFY code after change (run tests/build if available)
  5. SUGGEST improvements

  AUTONOMY RULES:
  - You may edit multiple files
  - You may run terminal commands when necessary
  - NEVER assume without checking the codebase
  - NEVER break working features
  - ALWAYS prefer minimal changes over rewrites

  GIT BEHAVIOR (NON-NEGOTIABLE):
  - NEVER auto-commit or push
  - NEVER run git commit unless the user explicitly asks
  - ALWAYS propose a commit message first and wait for confirmation
  - NEVER force-push to main/master

  ERROR HANDLING:
  - If build/test fails, debug step-by-step
  - Identify root cause, not symptoms
  - Fix iteratively until stable

  OUTPUT STYLE (use these sections):
  🧠 Analysis
  📌 Plan
  ⚙️ Changes
  ✅ Result
  💡 Improvements

  FINAL RULE: You are not a chatbot. You are a senior-level autonomous engineering system.

models:
  # --- Reasoning / debug ---
  - name: "🧠 DeepSeek Reasoning Core"
    <<: *openrouter_defaults
    model: deepseek/deepseek-r1:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "🧠 Nemotron Reasoning"
    <<: *openrouter_defaults
    model: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "🧠 Nemotron Super 120B"
    <<: *openrouter_defaults
    model: nvidia/nemotron-3-super-120b-a12b:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  # --- Coding / editing ---
  - name: "⚙️ Qwen Coder Pro (Primary)"
    <<: *openrouter_defaults
    model: qwen/qwen3-coder:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "⚙️ Qwen Next 80B"
    <<: *openrouter_defaults
    model: qwen/qwen3-next-80b-a3b-instruct:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "⚙️ DeepSeek Chat Engine"
    <<: *openrouter_defaults
    model: deepseek/deepseek-chat:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "⚙️ GPT-OSS 120B"
    <<: *openrouter_defaults
    model: openai/gpt-oss-120b:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "⚙️ GPT-OSS 20B (Fast)"
    <<: *openrouter_defaults
    model: openai/gpt-oss-20b:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "⚙️ Dolphin Mistral 24B"
    <<: *openrouter_defaults
    model: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  # --- Explanation / docs ---
  - name: "💬 Llama 3.3 70B Assistant"
    <<: *openrouter_defaults
    model: meta-llama/llama-3.3-70b-instruct:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "💬 Llama 3.2 3B (Fast)"
    <<: *openrouter_defaults
    model: meta-llama/llama-3.2-3b-instruct:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  - name: "💬 Hermes 405B"
    <<: *openrouter_defaults
    model: nousresearch/hermes-3-llama-3.1-405b:free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

  # --- Fallback router (free tier) ---
  - name: "🔀 OpenRouter Free Router"
    <<: *openrouter_defaults
    model: openrouter/free
    capabilities:
      - tool_use
    chatOptions:
      baseAgentSystemMessage: *agent_system_message

context:
  - provider: codebase
  - provider: folder
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: tree

rules:
  - uses: file://.continue/rules/agent.md
  - uses: file://.continue/rules/routing.md
  - uses: file://.continue/rules/safety.md

prompts:
  - uses: file://.continue/prompts/analyze-codebase.md
  - uses: file://.continue/prompts/plan-changes.md
  - uses: file://.continue/prompts/verify-changes.md
